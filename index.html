<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAILHOUSE HOOPS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Courier New', monospace;
  background: #f0ece0;
  color: #1a1a1a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
}

/* ── RETRO GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* ── MAIN CONTAINER ── */
#app {
  width: 100%;
  max-width: 420px;
  min-height: 620px;
  background: #1a1a1a;
  border: 3px solid #1a1a1a;
  position: relative;
  overflow: hidden;
}

/* ── SCREEN SYSTEM ── */
.screen { display: none; flex-direction: column; min-height: 620px; }
.screen.active { display: flex; }

/* ── HEADER BAR ── */
.topbar {
  background: #e8533a;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px solid #1a1a1a;
  flex-shrink: 0;
}
.topbar-title { font-size: 13px; font-weight: bold; color: #f0ece0; letter-spacing: 2px; text-transform: uppercase; }
.topbar-meta { font-size: 11px; color: #f0ece0; opacity: 0.85; }

/* ── CONTENT AREA ── */
.content { flex: 1; background: #f0ece0; overflow-y: auto; }
.pad { padding: 14px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  background: #1a1a1a;
  display: flex;
  border-top: 3px solid #1a1a1a;
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  padding: 10px 4px;
  background: #1a1a1a;
  color: #888;
  border: none;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  border-right: 1px solid #333;
  transition: background 0.1s, color 0.1s;
}
.nav-btn:last-child { border-right: none; }
.nav-btn.active { background: #e8533a; color: #f0ece0; }
.nav-btn:hover:not(.active) { color: #f0ece0; }

/* ── SECTION LABELS ── */
.section-label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #ccc;
}

/* ── BIG ACTION BUTTON ── */
.btn-main {
  display: block;
  width: 100%;
  padding: 14px;
  background: #e8533a;
  color: #f0ece0;
  border: 3px solid #1a1a1a;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  text-align: center;
  transition: background 0.1s, transform 0.05s;
  margin-bottom: 4px;
}
.btn-main:hover { background: #c93d26; }
.btn-main:active { transform: translateY(1px); }
.btn-main.dark { background: #1a1a1a; color: #f0ece0; }
.btn-main.dark:hover { background: #333; }
.btn-main.green { background: #2a7a3a; }
.btn-main.green:hover { background: #1e5e2c; }
.btn-main.sm { padding: 9px; font-size: 11px; }
.btn-main.outline { background: transparent; color: #1a1a1a; border-color: #1a1a1a; }
.btn-main.outline:hover { background: #1a1a1a; color: #f0ece0; }

/* ── TITLE SCREEN ── */
#s-title {
  background: #1a1a1a;
  align-items: center;
  justify-content: center;
}
.title-logo {
  font-size: 48px;
  margin-bottom: 16px;
}
.title-word {
  font-size: 28px;
  font-weight: bold;
  color: #e8533a;
  letter-spacing: 4px;
  text-transform: uppercase;
  line-height: 1.1;
  text-align: center;
}
.title-sub {
  font-size: 10px;
  color: #888;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin: 8px 0 32px;
  text-align: center;
}
.title-btns { width: 100%; padding: 0 24px; }

/* ── TEAM SELECT ── */
.team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.team-tile {
  padding: 12px 8px;
  background: #f0ece0;
  border: 2px solid #ccc;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.1s, background 0.1s;
}
.team-tile:hover { border-color: #1a1a1a; }
.team-tile.selected { border-color: #e8533a; background: #fff3f0; }
.team-tile-emoji { font-size: 22px; }
.team-tile-name { font-size: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
.team-tile-city { font-size: 9px; color: #888; margin-top: 1px; }

/* ── SCOUTING ── */
.scout-card {
  background: white;
  border: 2px solid #1a1a1a;
  padding: 12px;
  margin-bottom: 8px;
}
.scout-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.scout-name { font-size: 13px; font-weight: bold; }
.scout-pos-age { font-size: 10px; color: #888; margin-top: 1px; }
.ovr-box {
  font-size: 18px;
  font-weight: bold;
  min-width: 36px;
  text-align: center;
  line-height: 1;
  padding: 2px 4px;
  border: 2px solid #1a1a1a;
}
.ovr-S { color: #2a7a3a; border-color: #2a7a3a; }
.ovr-A { color: #4a7a2a; border-color: #4a7a2a; }
.ovr-B { color: #e8533a; border-color: #e8533a; }
.ovr-C { color: #888; border-color: #888; }
.scout-story { font-size: 10px; color: #666; margin-bottom: 8px; line-height: 1.4; font-style: italic; }
.stat-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.stat-key { font-size: 9px; width: 28px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
.stat-pip-row { display: flex; gap: 2px; }
.stat-pip { width: 6px; height: 6px; background: #ddd; }
.stat-pip.filled { background: #1a1a1a; }
.stat-pip.filled.high { background: #e8533a; }
.stat-num { font-size: 10px; font-weight: bold; width: 22px; text-align: right; }
.filter-row { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-btn {
  padding: 4px 10px;
  background: #f0ece0;
  border: 1px solid #ccc;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.filter-btn.active { background: #1a1a1a; color: #f0ece0; border-color: #1a1a1a; }

/* ── DRAFT ── */
.draft-status {
  background: #e8533a;
  color: #f0ece0;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: center;
  border-bottom: 2px solid #1a1a1a;
}
.draft-pick-row {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid #e0dcd0;
  font-size: 11px;
  cursor: pointer;
  background: #f0ece0;
  transition: background 0.1s;
}
.draft-pick-row:hover { background: #ffe8e3; }
.draft-pick-row.drafted { opacity: 0.4; pointer-events: none; background: #e8e4d8; }
.draft-pick-row.cpu-pick { background: #e8e4d8; pointer-events: none; }
.dpr-num { width: 22px; color: #888; font-size: 10px; }
.dpr-pos { width: 26px; }
.pos-tag { display: inline-block; background: #1a1a1a; color: #f0ece0; font-size: 8px; padding: 1px 4px; letter-spacing: 1px; }
.dpr-name { flex: 1; font-weight: bold; }
.dpr-age { width: 30px; color: #888; font-size: 10px; text-align: right; }
.dpr-ovr { width: 28px; font-weight: bold; text-align: right; }
.my-squad-row {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid #e0dcd0;
  font-size: 11px;
}
.pick-badge {
  display: inline-block;
  background: #e8533a;
  color: white;
  font-size: 9px;
  padding: 1px 6px;
  margin-right: 6px;
  font-weight: bold;
}
.board-row {
  display: flex;
  padding: 6px 14px;
  border-bottom: 1px solid #e0dcd0;
  font-size: 10px;
  background: #f0ece0;
}
.board-row.my-row { background: #fff3f0; }
.board-row.done { opacity: 0.6; }
.br-pick { width: 24px; color: #888; }
.br-team { width: 120px; font-weight: bold; }
.br-player { flex: 1; color: #444; }
.br-ovr { width: 24px; text-align: right; font-weight: bold; }

/* ── HUB / SEASON ── */
.hub-header {
  background: #1a1a1a;
  padding: 10px 14px;
  border-bottom: 3px solid #e8533a;
  flex-shrink: 0;
}
.hub-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.hub-team-name { font-size: 13px; font-weight: bold; color: #e8533a; letter-spacing: 1px; text-transform: uppercase; }
.hub-record { font-size: 13px; font-weight: bold; color: #f0ece0; }
.hub-bottom { display: flex; justify-content: space-between; }
.hub-meta { font-size: 10px; color: #888; }

/* ── TODAY TAB ── */
.game-card {
  background: white;
  border: 2px solid #1a1a1a;
  padding: 14px;
  margin-bottom: 8px;
}
.game-card.win { border-left: 5px solid #2a7a3a; }
.game-card.loss { border-left: 5px solid #e8533a; }
.matchup-line { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.match-team { font-size: 12px; font-weight: bold; text-transform: uppercase; }
.match-score { font-size: 22px; font-weight: bold; letter-spacing: 2px; text-align: center; }
.match-score.win { color: #2a7a3a; }
.match-score.loss { color: #e8533a; }
.match-score.upcoming { font-size: 14px; color: #888; letter-spacing: 1px; }
.result-tag { font-size: 10px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
.game-log-box { background: #f0ece0; border: 1px solid #ddd; padding: 8px; max-height: 100px; overflow-y: auto; margin-top: 8px; }
.log-line { font-size: 10px; color: #444; padding: 1px 0; border-bottom: 1px solid #e8e4d8; }
.log-line.big { color: #e8533a; font-weight: bold; }
.results-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid #e0dcd0;
  font-size: 11px;
}
.res-wl { font-weight: bold; font-size: 12px; }
.res-w { color: #2a7a3a; }
.res-l { color: #e8533a; }
.cal-row { display: flex; gap: 3px; overflow-x: auto; padding-bottom: 4px; }
.cal-day {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: bold;
  border: 1px solid #ccc;
  background: #f0ece0;
}
.cal-day.today { background: #1a1a1a; color: #f0ece0; border-color: #1a1a1a; }
.cal-day.win { background: #2a7a3a; color: white; border-color: #2a7a3a; }
.cal-day.loss { background: #e8533a; color: white; border-color: #e8533a; }

/* ── ROSTER TAB ── */
.roster-row {
  display: flex;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid #e0dcd0;
  font-size: 11px;
}
.rr-name { flex: 1; font-weight: bold; }
.rr-pos { width: 30px; }
.rr-age { width: 30px; color: #888; text-align: center; }
.rr-ovr { width: 30px; font-weight: bold; text-align: right; }
.starter-tag { display: inline-block; background: #2a7a3a; color: white; font-size: 8px; padding: 1px 4px; letter-spacing: 1px; margin-right: 4px; }
.bench-tag { display: inline-block; background: #ccc; color: #555; font-size: 8px; padding: 1px 4px; letter-spacing: 1px; margin-right: 4px; }

/* ── STATS TAB ── */
.stats-table { width: 100%; border-collapse: collapse; font-size: 10px; }
.stats-table th {
  background: #1a1a1a; color: #f0ece0; padding: 6px 4px;
  text-align: center; font-size: 9px; letter-spacing: 1px;
  position: sticky; top: 0; cursor: pointer;
}
.stats-table th:first-child { text-align: left; padding-left: 8px; }
.stats-table td { padding: 5px 4px; border-bottom: 1px solid #e0dcd0; text-align: center; }
.stats-table td:first-child { text-align: left; padding-left: 8px; font-weight: bold; }
.stats-table tr:hover td { background: #fff3f0; }
.stat-lead { color: #e8533a; font-weight: bold; }

/* ── STANDINGS ── */
.stand-row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #e0dcd0;
  font-size: 11px;
}
.stand-rank { width: 24px; color: #888; font-weight: bold; }
.stand-team { flex: 1; font-weight: bold; }
.stand-w { width: 28px; color: #2a7a3a; font-weight: bold; text-align: center; }
.stand-l { width: 28px; color: #e8533a; text-align: center; }
.stand-pct { width: 40px; color: #888; text-align: right; font-size: 10px; }
.my-stand { background: #fff3f0; border-left: 3px solid #e8533a; padding-left: 5px; }
.playoff-cut { border-top: 2px dashed #888 !important; }

/* ── POWER RANKINGS ── */
.pr-row {
  display: flex;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid #e0dcd0;
}
.pr-rank { width: 28px; font-size: 14px; font-weight: bold; color: #ccc; }
.pr-rank.gold { color: #d4a017; }
.pr-rank.silver { color: #888; }
.pr-rank.bronze { color: #a05a2c; }
.pr-name { flex: 1; font-size: 11px; font-weight: bold; text-transform: uppercase; }
.pr-record { font-size: 10px; color: #888; }
.pr-pips { display: flex; gap: 2px; align-items: center; margin: 0 8px; }
.pr-pip { width: 8px; height: 8px; background: #ddd; }
.pr-pip.on { background: #1a1a1a; }
.pr-pip.on.top { background: #e8533a; }
.pr-rating { width: 26px; font-weight: bold; font-size: 12px; text-align: right; }

/* ── TRADE ── */
.trade-row {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  border-bottom: 1px solid #e0dcd0;
  cursor: pointer;
  font-size: 11px;
  background: #f0ece0;
  transition: background 0.1s;
}
.trade-row:hover { background: #fff3f0; }
.trade-row.sel { background: #ffe8e3; border-left: 3px solid #e8533a; }
.trade-row.them-sel { background: #e3f0e8; border-left: 3px solid #2a7a3a; }
select.game-select {
  width: 100%;
  padding: 9px;
  background: #f0ece0;
  border: 2px solid #1a1a1a;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  cursor: pointer;
  margin-bottom: 8px;
  appearance: none;
  -webkit-appearance: none;
  color: #1a1a1a;
}
.trade-summary {
  background: white;
  border: 2px solid #1a1a1a;
  padding: 12px;
  margin-bottom: 8px;
  font-size: 11px;
}
.trade-line { display: flex; justify-content: space-between; margin-bottom: 4px; }
.trade-send { color: #e8533a; font-weight: bold; }
.trade-get { color: #2a7a3a; font-weight: bold; }

/* ── FREE AGENCY ── */
.fa-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #e0dcd0;
  font-size: 11px;
  gap: 8px;
}
.fa-info { flex: 1; }
.fa-name { font-weight: bold; }
.fa-detail { font-size: 10px; color: #888; margin-top: 1px; }
.fa-sign {
  padding: 5px 12px;
  background: #2a7a3a;
  color: white;
  border: none;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
}
.fa-sign:hover { background: #1e5e2c; }
.fa-sign:disabled { background: #ccc; cursor: not-allowed; }

/* ── LINEUP ── */
.lineup-slot {
  display: flex;
  align-items: center;
  padding: 10px;
  border: 2px solid #1a1a1a;
  margin-bottom: 6px;
  background: white;
  gap: 10px;
}
.lineup-pos { font-size: 10px; font-weight: bold; letter-spacing: 1px; background: #1a1a1a; color: #f0ece0; padding: 3px 6px; min-width: 32px; text-align: center; }
.lineup-select { flex: 1; background: transparent; border: none; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; outline: none; }
.lineup-ovr { font-weight: bold; font-size: 13px; }

/* ── PLAYOFFS ── */
.bracket-section { margin-bottom: 16px; }
.bracket-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 6px; }
.bracket-game {
  background: white;
  border: 2px solid #1a1a1a;
  margin-bottom: 4px;
  overflow: hidden;
}
.b-team { display: flex; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid #eee; font-size: 11px; }
.b-team:last-child { border-bottom: none; }
.b-team.winner { background: #f0ffe4; font-weight: bold; }
.b-team.loser { opacity: 0.5; }
.b-score { font-weight: bold; font-size: 13px; }
.champ-banner {
  background: #e8533a;
  color: #f0ece0;
  padding: 16px;
  text-align: center;
  margin-bottom: 12px;
}
.champ-banner-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; opacity: 0.8; }
.champ-banner-team { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
.champ-banner-rings { font-size: 20px; margin-top: 6px; letter-spacing: 4px; }

/* ── SIM MODAL ── */
.sim-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,26,26,0.92);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.sim-modal.open { display: flex; }
.sim-box {
  background: #f0ece0;
  width: 320px;
  border: 3px solid #1a1a1a;
  overflow: hidden;
}
.sim-header {
  background: #1a1a1a;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sim-header-txt { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #888; }
.sim-header-qtr { font-size: 10px; color: #e8533a; font-weight: bold; letter-spacing: 1px; }
.sim-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 14px; gap: 8px; }
.sim-team-name { font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: center; }
.sim-team-score { font-size: 32px; font-weight: bold; text-align: center; letter-spacing: -1px; }
.sim-vs { font-size: 10px; color: #888; text-align: center; }
.sim-log-area { background: white; border-top: 2px solid #1a1a1a; padding: 8px 10px; max-height: 120px; overflow-y: auto; }
.sim-log-line { font-size: 10px; color: #444; padding: 2px 0; border-bottom: 1px solid #f0ece0; }
.sim-log-line.highlight { color: #e8533a; font-weight: bold; }
.sim-continue {
  display: block;
  width: 100%;
  padding: 12px;
  background: #e8533a;
  color: #f0ece0;
  border: none;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}
.sim-continue:hover { background: #c93d26; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1a1a1a;
  color: #f0ece0;
  padding: 8px 18px;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  z-index: 500;
  white-space: nowrap;
  max-width: 380px;
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── DIVIDERS ── */
.divider { height: 1px; background: #ccc; margin: 12px 0; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mb8 { margin-bottom: 8px; }
.muted { color: #888; font-size: 10px; }
.bold { font-weight: bold; }
.red { color: #e8533a; }
.green { color: #2a7a3a; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }

<script>
'use strict';

// ═══════════════════════════════════
//  DATA
// ═══════════════════════════════════
const TEAMS_DATA = [
  {id:0,name:'BLOCK BOYZ',city:'Rikers',emoji:'⛓️'},
  {id:1,name:'LOCKDOWN',city:'Attica',emoji:'🔒'},
  {id:2,name:'YARD DOGS',city:'Pelican Bay',emoji:'🐕'},
  {id:3,name:'CHAIN GANG',city:'Sing Sing',emoji:'🔗'},
  {id:4,name:'SHOTCALLERS',city:'San Quentin',emoji:'📢'},
  {id:5,name:'FENCE RUNNERS',city:'Folsom',emoji:'🏃'},
  {id:6,name:'SOLITARY',city:'Alcatraz',emoji:'🏝️'},
  {id:7,name:'SHIV SQUAD',city:'Angola',emoji:'⚡'},
  {id:8,name:'HARD TIME',city:"Riker's East",emoji:'💪'},
  {id:9,name:'CONCRETE COWBOYS',city:'McNeil',emoji:'🤠'},
];

const RAW_PLAYERS = [
  ["Darius 'D-Lock' Johnson","PG",22,"Lightning quick, grew up in Compton. Can't be stopped one-on-one."],
  ["Marcus 'Big M' Thompson","C",28,"6'11\" of pure muscle. Owns the paint. In for two counts."],
  ["Ray 'Smooth' Williams","SG",24,"Can score from anywhere. Did time in three different yards."],
  ["Tyrone 'T-Bone' Davis","PF",26,"Dropped 40 in the last championship. Nobody posts him up."],
  ["Devon 'Deuce' Harris","SF",23,"Lockdown defender with a mid-range J. Quiet but dangerous."],
  ["Lamar 'Lam Lam' Foster","PG",20,"Youngest prospect in the draft. Generational upside."],
  ["Kendrick 'KD' Simmons","SF",27,"Pure scorer. Silky release. 4 years at max security gym."],
  ["Antoine 'Tone' Reeves","SG",25,"Hits threes in your face. Zero conscience. 9 threes in one game."],
  ["Jerome 'Big J' Washington","C",31,"Old but smart. IQ off the charts. Won't quit."],
  ["Chris 'C-Note' Brown","PF",24,"Rebounds like his life depends on it. All hustle, all game."],
  ["Malik 'Mal' Green","PG",21,"Elite passer. Pure floor general. Makes everyone better."],
  ["Deon 'Ace' Parker","SG",29,"Been here longest. Old-school scorer. Hates losing."],
  ["Terrell 'TJ' Jordan","SF",22,"40-inch vertical. Unpolished but give him time."],
  ["Reggie 'Big Reg' Moss","C",25,"Led the yard in blocks three straight seasons."],
  ["Quincy 'Q' Bell","PF",23,"Can play 3-4-5. They call him the Swiss Army Knife."],
  ["Nate 'Nightmare' Ellis","SG",26,"Only goes up in big moments. Can't guard him late."],
  ["Booker 'Book' James","PG",24,"Can play on or off ball. Underrated everywhere he's been."],
  ["Vince 'Big V' Coleman","PF",30,"Won't wow you but wins games. Leadership locked."],
  ["Tremaine 'Tre' Scott","SF",21,"Lockdown wing. No shot yet but will guard anyone."],
  ["Curtis 'C-Dog' Miles","C",27,"Rare big who can step out and hit the mid."],
  ["Bam 'Bamboozle' Wright","PG",19,"Wildly athletic. No half-court game. Sky-high ceiling."],
  ["Lionel 'Lion' King","SF",28,"Championship pedigree. Led team to title two seasons ago."],
  ["Frankie 'Franchise' Cole","SG",23,"Just needs a stage. Bucket after bucket in workouts."],
  ["Otis 'OG' Monroe","C",32,"Teaching the youngins. Won't move but knows the game cold."],
  ["Calvin 'Calv' Reed","PF",24,"Stretch big who can hit from deep. Opens the floor."],
  ["Jaylen 'JB' Brooks","PG",20,"Explosive first step. Defense needs work. Offense is ready."],
  ["Hassan 'Big H' Ali","C",26,"Strong as an ox. Elite rebounding. Commands the paint."],
  ["Omar 'O-Dawg' Price","SF",25,"Three and D in its purest form. Every team wants him."],
  ["Shawn 'Lil Shawn' Davis","SG",22,"Unconscious from three. Rival of Antoine Reeves."],
  ["Dante 'D2' Turner","PF",27,"Old-school post game. Slips the pick-roll for easy buckets."]
];

// ═══════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════
let G = {};

function newGame() {
  G = {
    myTeamId: null,
    teams: TEAMS_DATA.map(t => ({...t, roster:[], wins:0, losses:0, pf:0, pa:0})),
    players: [],
    freeAgents: [],
    season: 1,
    rings: 0,
    day: 1,
    totalDays: 60,
    schedule: [],
    results: [],
    draftOrder: [],
    draftPick: 0,
    draftPicks: [],
    lineupSlots: {PG:null,SG:null,SF:null,PF:null,C:null},
    playoff: null,
    playoffActive: false,
    seasonDone: false,
    simCb: null,
    activeTab: 'today',
    moreTab: 'power',
    tradeState: {myPids:[], theirPids:[], targetId:null},
  };
  generatePlayers();
}

// Filler name parts for procedural generation
const FILLER_FIRST = ['Big','Lil','OG','Young','Slick','Ice','Raw','True','Real','Fast'];
const FILLER_LAST  = ['Money','Smoke','Stone','Blaze','Ghost','Roc','Flex','Tank','Ace','Steel'];
const FILLER_STORIES = [
  "Nobody drafted him — he earned his spot the hard way.",
  "Came up through the yard leagues. No hype, all game.",
  "Underrated everywhere he's been. Ready to prove them wrong.",
  "Late bloomer. Stats don't lie — the kid can play.",
  "Grinder. First in the gym, last to leave.",
];

function generateFillerPlayer(id) {
  const pos = ['PG','SG','SF','PF','C'][id % 5];
  const age = 19 + Math.floor(Math.random() * 10);
  const first = FILLER_FIRST[id % FILLER_FIRST.length];
  const last  = FILLER_LAST[Math.floor(id / FILLER_FIRST.length) % FILLER_LAST.length];
  return {
    id,
    name: `${first} "${first[0]}${last[0]}" ${last}`,
    pos,
    age,
    story: FILLER_STORIES[id % FILLER_STORIES.length],
    stats: genStats(pos, age),
    teamId: null,
    seasonStats: freshStats(),
  };
}

function generatePlayers() {
  // Build base roster from named prospects
  G.players = RAW_PLAYERS.map((d,i) => ({
    id: i,
    name: d[0],
    pos: d[1],
    age: d[2],
    story: d[3],
    stats: genStats(d[1], d[2]),
    teamId: null,
    seasonStats: freshStats(),
  }));

  // AUDIT: draft needs numTeams × rounds players minimum
  const numTeams  = TEAMS_DATA.length;   // 10
  const rounds    = 5;
  const totalNeeded = numTeams * rounds; // 50

  // TOP UP: generate filler players until pool is large enough
  let fillerId = G.players.length;
  while (G.players.length < totalNeeded) {
    G.players.push(generateFillerPlayer(fillerId++));
  }

  G.players.sort((a,b) => calcOvr(b) - calcOvr(a));
  G.players.forEach((p,i) => p.id = i);
}

function genStats(pos, age) {
  const r = (lo, hi) => Math.round(lo + Math.random()*(hi-lo));
  const ag = age < 22 ? -6 : age > 30 ? -10 : age > 27 ? -4 : 0;
  const c = v => Math.max(30, Math.min(99, v));
  if(pos==='PG') return {spd:c(r(70,99)+ag),hnd:c(r(65,99)+ag),pas:c(r(68,99)+ag),sht:c(r(55,90)+ag),tp3:c(r(50,90)+ag),def:c(r(45,85)+ag),reb:c(r(30,60)+ag),phy:c(r(40,75)+ag),iq:c(r(60,99)+ag)};
  if(pos==='SG') return {spd:c(r(65,95)+ag),hnd:c(r(60,92)+ag),pas:c(r(50,80)+ag),sht:c(r(68,99)+ag),tp3:c(r(62,99)+ag),def:c(r(50,85)+ag),reb:c(r(35,65)+ag),phy:c(r(45,78)+ag),iq:c(r(55,92)+ag)};
  if(pos==='SF') return {spd:c(r(62,92)+ag),hnd:c(r(55,88)+ag),pas:c(r(48,80)+ag),sht:c(r(58,93)+ag),tp3:c(r(52,88)+ag),def:c(r(58,92)+ag),reb:c(r(50,82)+ag),phy:c(r(58,88)+ag),iq:c(r(52,90)+ag)};
  if(pos==='PF') return {spd:c(r(50,82)+ag),hnd:c(r(45,80)+ag),pas:c(r(40,72)+ag),sht:c(r(45,85)+ag),tp3:c(r(35,75)+ag),def:c(r(62,95)+ag),reb:c(r(68,99)+ag),phy:c(r(70,99)+ag),iq:c(r(50,88)+ag)};
  return {spd:c(r(38,70)+ag),hnd:c(r(35,68)+ag),pas:c(r(35,65)+ag),sht:c(r(38,78)+ag),tp3:c(r(20,60)+ag),def:c(r(68,99)+ag),reb:c(r(72,99)+ag),phy:c(r(75,99)+ag),iq:c(r(48,88)+ag)};
}

function freshStats() { return {gp:0,pts:0,reb:0,ast:0,stl:0,blk:0,fga:0,fg:0,tpa:0,tp:0}; }

function calcOvr(p) {
  const s = p.stats;
  const w = {spd:0.11,hnd:0.13,pas:0.10,sht:0.14,tp3:0.07,def:0.13,reb:0.10,phy:0.08,iq:0.14};
  return Math.round(Object.keys(w).reduce((sum,k) => sum+(s[k]||50)*w[k], 0));
}

function ovrGrade(o) {
  if(o>=88) return 'S';
  if(o>=78) return 'A';
  if(o>=68) return 'B';
  return 'C';
}

function teamPower(tid) {
  const t = G.teams.find(x=>x.id===tid);
  if(!t||!t.roster.length) return 50;
  const pows = t.roster.map(pid=>{const p=G.players.find(x=>x.id===pid);return p?calcOvr(p):50;});
  const top5 = [...pows].sort((a,b)=>b-a).slice(0,5);
  const rest = [...pows].sort((a,b)=>b-a).slice(5);
  const s5 = top5.reduce((a,b)=>a+b,0)/top5.length;
  const sb = rest.length ? rest.reduce((a,b)=>a+b,0)/rest.length : s5;
  return Math.round(s5*0.78 + sb*0.22);
}

function myTeam() { return G.teams.find(t=>t.id===G.myTeamId); }

// ═══════════════════════════════════
//  SCREEN NAV
// ═══════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════
//  TEAM SELECT
// ═══════════════════════════════════
function renderTeamSelect() {
  const grid = document.getElementById('team-grid');
  grid.innerHTML = TEAMS_DATA.map(t => `
    <div class="team-tile" id="tt-${t.id}" onclick="pickTeam(${t.id})">
      <div class="team-tile-emoji">${t.emoji}</div>
      <div class="team-tile-name">${t.name}</div>
      <div class="team-tile-city">${t.city}</div>
    </div>`).join('');
}

function pickTeam(id) {
  G.myTeamId = id;
  document.querySelectorAll('.team-tile').forEach(t => t.classList.remove('selected'));
  document.getElementById('tt-'+id).classList.add('selected');
}

// ═══════════════════════════════════
//  SCOUTING
// ═══════════════════════════════════
function renderScouting(pos='ALL') {
  const list = document.getElementById('scout-list');
  const players = pos==='ALL' ? G.players : G.players.filter(p=>p.pos===pos);
  const SHOWN = ['spd','hnd','sht','def','reb'];
  list.innerHTML = players.map(p => {
    const o = calcOvr(p);
    const grade = ovrGrade(o);
    const statPips = SHOWN.map(k => {
      const v = p.stats[k];
      const filled = Math.round(v/10);
      const pips = Array.from({length:10},(_,i)=>`<div class="stat-pip ${i<filled?'filled'+(filled>=8?' high':''):''}"></div>`).join('');
      return `<div class="stat-row"><span class="stat-key">${k}</span><div class="stat-pip-row">${pips}</div><span class="stat-num">${v}</span></div>`;
    }).join('');
    return `<div class="scout-card">
      <div class="scout-header">
        <div><div class="scout-name">${p.name}</div><div class="scout-pos-age">${p.pos} · Age ${p.age}</div></div>
        <div class="ovr-box ovr-${grade}">${o}</div>
      </div>
      <div class="scout-story">"${p.story}"</div>
      ${statPips}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════
//  DRAFT
// ═══════════════════════════════════
function initDraft() {
  // Reset rosters
  G.teams.forEach(t => { t.roster=[]; t.wins=0; t.losses=0; t.pf=0; t.pa=0; });
  G.players.forEach(p => { p.teamId=null; p.seasonStats=freshStats(); });
  G.draftPicks = [];
  G.draftPick = 0;

  // Snake draft order
  const order = shuffle([...TEAMS_DATA.map(t=>t.id)]);
  const myIdx = order.indexOf(G.myTeamId);
  if(myIdx > 4) { const s=Math.floor(Math.random()*5);[order[myIdx],order[s]]=[order[s],order[myIdx]]; }
  G.draftOrder = [];
  for(let r=0;r<5;r++) {
    const rnd = r%2===0 ? [...order] : [...order].reverse();
    rnd.forEach((tid,i) => G.draftOrder.push({round:r+1, pick:r*10+i+1, teamId:tid}));
  }
  renderDraftStatus();
  renderDraftPicks();
  renderDraftBoard();
  renderMySquad();
  advanceCpuPicks();
}

function advanceCpuPicks() {
  const slot = G.draftOrder[G.draftPick];

  // SAFETY: no more slots → draft is done
  if(!slot) { finalizeDraft(); return; }

  // It's the human's turn → stop and wait for user input
  if(slot.teamId === G.myTeamId) { renderDraftStatus(); return; }

  // CPU pick
  const teamPicks = G.draftPicks.filter(p=>p.teamId===slot.teamId);
  const taken = new Set(G.draftPicks.map(p=>p.playerId));
  const avail = G.players.filter(p=>!taken.has(p.id));

  // SAFETY: pool exhausted mid-draft → end cleanly, do NOT loop
  if(!avail.length) { finalizeDraft(); return; }

  const needs = getPosNeeds(teamPicks);
  let best = null, bestScore = -1;
  avail.forEach(p => {
    let sc = calcOvr(p) + (needs[p.pos]>0 ? 10 : 0);
    if(sc>bestScore){bestScore=sc;best=p;}
  });

  if(best) executePick(best.id);

  // Continue to next pick (CPU or hand off to user)
  setTimeout(advanceCpuPicks, 180);
}

function executePick(pid) {
  const slot = G.draftOrder[G.draftPick];
  if(!slot) return;

  // SAFETY: ensure the player actually exists before drafting
  const player = G.players.find(p=>p.id===pid);
  if(!player) { finalizeDraft(); return; }

  G.draftPicks.push({round:slot.round,pick:slot.pick,teamId:slot.teamId,playerId:pid});
  const team = G.teams.find(t=>t.id===slot.teamId);
  team.roster.push(pid);
  player.teamId = slot.teamId;
  G.draftPick++;
  renderDraftStatus();
  renderDraftPicks();
  renderDraftBoard();
  renderMySquad();
}

function playerPick(pid) {
  const slot = G.draftOrder[G.draftPick];
  if(!slot || slot.teamId !== G.myTeamId) return;
  executePick(pid);
  advanceCpuPicks();
}

function getPosNeeds(picks) {
  const needs = {PG:1,SG:1,SF:1,PF:1,C:1};
  picks.forEach(pk => {
    const p = G.players.find(x=>x.id===pk.playerId);
    if(p && needs[p.pos]>0) needs[p.pos]--;
  });
  return needs;
}

function renderDraftStatus() {
  const el = document.getElementById('draft-status');
  if(G.draftPick >= G.draftOrder.length) {
    el.textContent = 'DRAFT COMPLETE';
    return;
  }
  const slot = G.draftOrder[G.draftPick];
  const isMe = slot.teamId===G.myTeamId;
  const team = G.teams.find(t=>t.id===slot.teamId);
  el.textContent = `ROUND ${slot.round} · PICK ${slot.pick}${isMe?' · YOUR PICK ⭐':'  · '+team.name}`;
}

function renderDraftPicks() {
  const taken = new Set(G.draftPicks.map(p=>p.playerId));
  const avail = G.players.filter(p=>!taken.has(p.id));
  const slot = G.draftOrder[G.draftPick];
  const myTurn = slot && slot.teamId===G.myTeamId;
  document.getElementById('dpanel-picks').innerHTML = avail.map(p => {
    const o = calcOvr(p);
    const grade = ovrGrade(o);
    return `<div class="draft-pick-row" onclick="${myTurn?`playerPick(${p.id})`:''}">
      <span class="dpr-num">${G.players.indexOf(p)+1}</span>
      <span class="dpr-pos"><span class="pos-tag">${p.pos}</span></span>
      <span class="dpr-name">${p.name}</span>
      <span class="dpr-age">${p.age}</span>
      <span class="dpr-ovr ovr-${grade}">${o}</span>
    </div>`;
  }).join('') || '<div class="pad muted">All players drafted.</div>';
}

function renderDraftBoard() {
  document.getElementById('dpanel-board').innerHTML = G.draftOrder.map(slot => {
    const pick = G.draftPicks.find(p=>p.pick===slot.pick);
    const team = G.teams.find(t=>t.id===slot.teamId);
    const player = pick ? G.players.find(p=>p.id===pick.playerId) : null;
    const isMe = slot.teamId===G.myTeamId;
    return `<div class="board-row ${isMe?'my-row':''} ${pick?'done':''}">

// ═══════════════════════════════════
//  SEASON
// ═══════════════════════════════════
function startSeason() {
  G.teams.forEach(t => { t.wins=0; t.losses=0; t.pf=0; t.pa=0; });
  G.players.forEach(p => { if(p.teamId!==null) p.seasonStats=freshStats(); });
  G.day = 1;
  G.totalDays = 60;
  G.schedule = buildSchedule();
  G.results = [];
  G.playoff = null;
  G.playoffActive = false;
  G.seasonDone = false;
  autoSetLineup();
  updateHubBar();
  show('s-hub');
  switchHubTab('today');
  toast('Season ' + G.season + ' tip-off!');
}

function buildSchedule() {
  const sched = [];
  for(let d=1; d<=60; d++) {
    const ids = shuffle([...G.teams.map(t=>t.id)]);
    for(let i=0;i<10;i+=2) sched.push({day:d,home:ids[i],away:ids[i+1],result:null});
  }
  return sched;
}

function autoSetLineup() {
  G.lineupSlots = {PG:null,SG:null,SF:null,PF:null,C:null};
  const roster = myTeam().roster.map(id=>G.players.find(p=>p.id===id)).filter(Boolean);
  ['PG','SG','SF','PF','C'].forEach(pos => {
    const p = roster.find(p=>p.pos===pos && !Object.values(G.lineupSlots).includes(p.id));
    if(p) G.lineupSlots[pos]=p.id;
  });
  ['PG','SG','SF','PF','C'].forEach(pos => {
    if(!G.lineupSlots[pos]) {
      const p = roster.find(p=>!Object.values(G.lineupSlots).includes(p.id));
      if(p) G.lineupSlots[pos]=p.id;
    }
  });
}

function updateHubBar() {
  const t = myTeam();
  document.getElementById('hub-team').textContent = t.emoji+' '+t.name;
  document.getElementById('hub-record').textContent = t.wins+'-'+t.losses;
  document.getElementById('hub-season').textContent = 'S'+G.season;
  document.getElementById('hub-rings').textContent = '🏆×'+G.rings;
  const base = new Date(2024,9,1);
  base.setDate(base.getDate()+G.day-1);
  document.getElementById('hub-date').textContent = base.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ── TODAY ──
function buildTodayHTML() {
  const todayGames = G.schedule.filter(g=>g.day===G.day&&!g.result);
  const myGame = todayGames.find(g=>g.home===G.myTeamId||g.away===G.myTeamId);
  const done = G.results.filter(g=>g.home===G.myTeamId||g.away===G.myTeamId).slice(-5).reverse();

  // Calendar
  const calStart = Math.max(1,G.day-2);
  const calEnd = Math.min(G.totalDays,G.day+8);
  let calHtml='<div class="cal-row">';
  for(let d=calStart;d<=calEnd;d++) {
    const res=G.results.find(g=>g.day===d&&(g.home===G.myTeamId||g.away===G.myTeamId));
    let cls='';
    if(d===G.day) cls='today';
    else if(res) { const w=isWin(res,G.myTeamId); cls=w?'win':'loss'; }
    calHtml+=`<div class="cal-day ${cls}">${d}</div>`;
  }
  calHtml+='</div>';

  // Game card
  let gameHtml='';
  if(G.seasonDone) {
    gameHtml=`<div class="game-card"><div class="section-label">REGULAR SEASON FINAL</div><div style="font-size:11px;color:#888">${myTeam().wins}-${myTeam().losses} record. Head to playoffs.</div></div>`;
  } else if(!myGame) {
    gameHtml=`<div class="game-card"><div class="muted">No game today.</div></div>`;
  } else {
    const opp=G.teams.find(t=>t.id===(myGame.home===G.myTeamId?myGame.away:myGame.home));
    const isHome=myGame.home===G.myTeamId;
    gameHtml=`<div class="game-card">
      <div class="section-label">${isHome?'HOME':'AWAY'} GAME · DAY ${G.day}</div>
      <div class="matchup-line">
        <div class="match-team">${myTeam().emoji} ${myTeam().name}</div>
        <div style="font-size:10px;color:#888">VS</div>
        <div class="match-team">${opp.emoji} ${opp.name}</div>
      </div>
      <button class="btn-main sm" onclick="playMyGame()">▶ PLAY</button>
    </div>`;
  }

  // Recent
  let recentHtml='';
  if(!done.length) recentHtml='<div class="muted">No games yet.</div>';
  else done.forEach(g=>{
    const w=isWin(g,G.myTeamId);
    const opp=G.teams.find(t=>t.id===(g.home===G.myTeamId?g.away:g.home));
    const ms=g.home===G.myTeamId?g.result.hs:g.result.as;
    const os=g.home===G.myTeamId?g.result.as:g.result.hs;
    recentHtml+=`<div class="results-row">
      <span class="res-wl ${w?'res-w':'res-l'}">${w?'W':'L'}</span>
      <span style="flex:1">${opp.name}</span>
      <span style="font-weight:bold">${ms}-${os}</span>
    </div>`;
  });

  let nextDayBtn = G.seasonDone
    ? `<button class="btn-main sm dark" onclick="initPlayoffsAndShow()">PLAYOFFS ▶</button>`
    : `<button class="btn-main sm dark" onclick="advanceDay()">NEXT DAY ▶</button>`;

  return `<div class="pad">
    <div class="section-label">CALENDAR</div>
    ${calHtml}
    <div class="mt8">${gameHtml}</div>
    <div class="mt8">
      <div class="section-label">RECENT RESULTS</div>
      ${recentHtml}
    </div>
    <div class="mt12">${nextDayBtn}</div>
  </div>`;
}

function isWin(g, tid) {
  if(!g.result) return false;
  return (g.home===tid&&g.result.hs>g.result.as)||(g.away===tid&&g.result.as>g.result.hs);
}

function advanceDay() {
  if(G.seasonDone) { initPlayoffsAndShow(); return; }
  const games = G.schedule.filter(g=>g.day===G.day&&!g.result);
  if(!games.length) { G.day++; if(G.day>G.totalDays){G.seasonDone=true;} updateHubBar(); renderHubTab(); return; }
  // Sim other games fast
  const myGame = games.find(g=>g.home===G.myTeamId||g.away===G.myTeamId);
  games.forEach(g=>{ if(g!==myGame) simFast(g); });
  if(myGame) {
    playMyGame();
  } else {
    G.day++;
    if(G.day>G.totalDays) G.seasonDone=true;
    updateHubBar(); renderHubTab();
  }
}

function playMyGame() {
  const games = G.schedule.filter(g=>g.day===G.day&&!g.result);
  const myGame = games.find(g=>g.home===G.myTeamId||g.away===G.myTeamId);
  if(!myGame) { advanceDay(); return; }
  // sim other games first
  games.forEach(g=>{ if(g!==myGame) simFast(g); });
  runSimVisual(myGame, () => {
    G.day++;
    if(G.day>G.totalDays) G.seasonDone=true;
    updateHubBar(); renderHubTab();
  });
}

function buildStatsHTML() {
  const all = G.players.filter(p=>p.teamId!==null&&p.seasonStats.gp>0);
  all.sort((a,b)=>(b.seasonStats.pts/Math.max(1,b.seasonStats.gp))-(a.seasonStats.pts/Math.max(1,a.seasonStats.gp)));
  return `<div style="overflow-x:auto;"><table class="stats-table"><thead><tr>
    <th>PLAYER</th><th>GP</th><th>PTS</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>FG%</th>
  </tr></thead><tbody>${all.slice(0,25).map(p=>{
    const ss=p.seasonStats;
    const gp=Math.max(1,ss.gp);
    const isMy=p.teamId===G.myTeamId;
    return `<tr style="${isMy?'background:#fff3f0;':''}">
      <td>${p.name.split("'")[0].split(' ')[1]||p.name.split(' ')[0]}<span class="muted"> ${G.teams.find(t=>t.id===p.teamId)?.name.slice(0,4)||''}</span></td>
      <td>${gp}</td>
      <td class="${isMy?'stat-lead':''}">${(ss.pts/gp).toFixed(1)}</td>
      <td>${(ss.reb/gp).toFixed(1)}</td>
      <td>${(ss.ast/gp).toFixed(1)}</td>
      <td>${(ss.stl/gp).toFixed(1)}</td>
      <td>${(ss.blk/gp).toFixed(1)}</td>
      <td>${ss.fga>0?((ss.fg/ss.fga)*100).toFixed(0)+'%':'—'}</td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
}

// ── TRADE ──
function buildTradeHTML() {
  const ts = G.tradeState;
  const others = G.teams.filter(t=>t.id!==G.myTeamId);
  const myRoster = myTeam().roster.map(id=>G.players.find(p=>p.id===id)).filter(Boolean);

  let targetHtml='';
  if(ts.targetId) {
    const tt=G.teams.find(t=>t.id===ts.targetId);
    targetHtml=tt.roster.map(pid=>{
      const p=G.players.find(x=>x.id===pid);if(!p)return'';
      const sel=ts.theirPids.includes(pid);
      return `<div class="trade-row ${sel?'them-sel':''}" onclick="toggleTheirPlayer(${pid})">
        <span class="pos-tag" style="margin-right:6px">${p.pos}</span>
        <span style="flex:1">${p.name}</span>
        <span class="dpr-ovr ovr-${ovrGrade(calcOvr(p))}">${calcOvr(p)}</span>
      </div>`;
    }).join('');
  }

  let summaryHtml='';
  if(ts.myPids.length||ts.theirPids.length) {
    const sends=ts.myPids.map(id=>G.players.find(p=>p.id===id)?.name).join(', ')||'nothing';
    const gets=ts.theirPids.map(id=>G.players.find(p=>p.id===id)?.name).join(', ')||'nothing';
    summaryHtml=`<div class="trade-summary">
      <div class="trade-line"><span class="muted">YOU SEND</span><span class="trade-send">${sends}</span></div>
      <div class="trade-line"><span class="muted">YOU GET</span><span class="trade-get">${gets}</span></div>
    </div>
    <button class="btn-main sm green" onclick="sendTrade()">SEND OFFER</button>
    <button class="btn-main sm dark mt8" onclick="resetTrade()">RESET</button>`;
  }

  return `<div class="section-label">TRADE CENTER</div>
    <select class="game-select" onchange="setTradeTarget(+this.value)">
      <option value="">— SELECT TEAM —</option>
      ${others.map(t=>`<option value="${t.id}" ${ts.targetId===t.id?'selected':''}>${t.emoji} ${t.name}</option>`).join('')}
    </select>
    <div class="section-label">YOUR PLAYERS (tap to offer)</div>
    ${myRoster.map(p=>{
      const sel=ts.myPids.includes(p.id);
      return `<div class="trade-row ${sel?'sel':''}" onclick="toggleMyPlayer(${p.id})">
        <span class="pos-tag" style="margin-right:6px">${p.pos}</span>
        <span style="flex:1">${p.name}</span>
        <span class="dpr-ovr ovr-${ovrGrade(calcOvr(p))}">${calcOvr(p)}</span>
      </div>`;
    }).join('')}
    ${ts.targetId?`<div class="section-label mt8">THEIR PLAYERS (tap to request)</div>${targetHtml}`:''}
    <div class="mt8">${summaryHtml}</div>`;
}

function setTradeTarget(id) { G.tradeState.targetId=id||null; G.tradeState.theirPids=[]; switchMoreTab('trade'); }
function toggleMyPlayer(id) {
  const i=G.tradeState.myPids.indexOf(id);
  if(i>-1) G.tradeState.myPids.splice(i,1); else G.tradeState.myPids.push(id);
  switchMoreTab('trade');
}
function toggleTheirPlayer(id) {
  const i=G.tradeState.theirPids.indexOf(id);
  if(i>-1) G.tradeState.theirPids.splice(i,1); else G.tradeState.theirPids.push(id);
  switchMoreTab('trade');
}
function resetTrade() { G.tradeState={myPids:[],theirPids:[],targetId:null}; switchMoreTab('trade'); }
function sendTrade() {
  const {myPids,theirPids,targetId}=G.tradeState;
  if(!targetId){toast('Select a team first.');return;}
  const myOvr=myPids.reduce((s,id)=>s+calcOvr(G.players.find(p=>p.id===id)),0);
  const theirOvr=theirPids.reduce((s,id)=>s+calcOvr(G.players.find(p=>p.id===id)),0);
  if(theirOvr<=myOvr+10) {
    const tt=G.teams.find(t=>t.id===targetId);
    myPids.forEach(id=>{ myTeam().roster=myTeam().roster.filter(r=>r!==id); tt.roster.push(id); G.players.find(p=>p.id===id).teamId=targetId; });
    theirPids.forEach(id=>{ tt.roster=tt.roster.filter(r=>r!==id); myTeam().roster.push(id); G.players.find(p=>p.id===id).teamId=G.myTeamId; });
    autoSetLineup();
    toast('Trade accepted!');
    resetTrade();
  } else {
    toast('Trade rejected — offer more value.');
  }
}

// ── PLAYOFFS ──
function buildPlayoffHTML() {
  if(!G.playoff) {
    const sorted=[...G.teams].sort((a,b)=>b.wins-a.wins||a.losses-b.losses);
    return `<div class="section-label">PLAYOFFS</div>
      <div class="muted">Regular season must finish first.</div>
      <div class="mt8"><div class="section-label">PROJECTED TOP 8</div>
      ${sorted.slice(0,8).map((t,i)=>`<div class="results-row"><span style="color:#888;width:20px;display:inline-block">${i+1}</span><span style="flex:1">${t.emoji} ${t.name}</span><span>${t.wins}W</span></div>`).join('')}
      </div>`;
  }
  const b=G.playoff;
  const tn=id=>{if(!id)return'TBD';const t=G.teams.find(t=>t.id===id);return t?t.emoji+' '+t.name:'TBD';};
  const gameHtml=(g)=>{
    if(!g.h||!g.a) return `<div class="bracket-game"><div class="b-team">TBD</div><div class="b-team">TBD</div></div>`;
    const hw=g.result&&g.result.winner===g.h;
    const aw=g.result&&g.result.winner===g.a;
    return `<div class="bracket-game">
      <div class="b-team ${hw?'winner':g.result?'loser':''}">${tn(g.h)}<span class="b-score">${g.result?g.result.hs:''}</span></div>
      <div class="b-team ${aw?'winner':g.result?'loser':''}">${tn(g.a)}<span class="b-score">${g.result?g.result.as:''}</span></div>
    </div>`;
  };

  const champHtml=b.champ?`<div class="champ-banner"><div class="champ-banner-title">Champion</div><div class="champ-banner-team">${tn(b.champ)}</div><div class="champ-banner-rings">${'🏆'.repeat(G.rings)}</div></div>`:'';

  return `${champHtml}
    <div class="bracket-section"><div class="bracket-label">FIRST ROUND</div>${b.r1.map(g=>gameHtml(g)).join('')}</div>
    <div class="bracket-section"><div class="bracket-label">SEMIFINALS</div>${b.r2.map(g=>gameHtml(g)).join('')}</div>
    <div class="bracket-section"><div class="bracket-label">THE FINAL</div>${b.finals.map(g=>gameHtml(g)).join('')}</div>
    ${!b.champ?`<button class="btn-main sm dark" onclick="simPlayoffRound()">▶ SIM NEXT ROUND</button>`:''}
    ${b.champ?`<button class="btn-main sm green mt8" onclick="doNextSeason()">NEXT SEASON ▶</button>`:''}`;
}

function initPlayoffsAndShow() {
  const sorted=[...G.teams].sort((a,b)=>b.wins-a.wins||a.losses-b.losses);
  const top8=sorted.slice(0,8).map(t=>t.id);
  G.playoff={
    r1:[{h:top8[0],a:top8[7],result:null},{h:top8[1],a:top8[6],result:null},{h:top8[2],a:top8[5],result:null},{h:top8[3],a:top8[4],result:null}],
    r2:[{h:null,a:null,result:null},{h:null,a:null,result:null}],
    finals:[{h:null,a:null,result:null}],
    round:1,
    champ:null,
  };
  G.playoffActive=true;
  switchMoreTab('playoffs');
  switchHubTab('more');
}

function simPlayoffRound() {
  const b=G.playoff;
  const getRound=()=>b.round===1?b.r1:b.round===2?b.r2:b.finals;
  const games=getRound().filter(g=>g.h&&g.a&&!g.result);
  if(!games.length){advancePlayoffRound();return;}

  const myGame=games.find(g=>g.h===G.myTeamId||g.a===G.myTeamId);
  games.forEach(g=>{if(g!==myGame)simPlayoffFast(g);});

  if(myGame) {
    const r=calcGame(myGame.h,myGame.a);
    runSimVisual({home:myGame.h,away:myGame.a,result:null},()=>{
      myGame.result={winner:r.hs>r.as?myGame.h:myGame.a,hs:r.hs,as:r.as};
      checkAdvancePlayoff();
      switchMoreTab('playoffs');
    });
  } else {
    checkAdvancePlayoff();
    switchMoreTab('playoffs');
  }
}

function simPlayoffFast(g) {
  const r=calcGame(g.h,g.a);
  g.result={winner:r.hs>r.as?g.h:g.a,hs:r.hs,as:r.as};
}

function checkAdvancePlayoff() {
  const b=G.playoff;
  const getRound=()=>b.round===1?b.r1:b.round===2?b.r2:b.finals;
  const done=getRound().filter(g=>g.h&&g.a).every(g=>g.result);
  if(done) advancePlayoffRound();
}

function advancePlayoffRound() {
  const b=G.playoff;
  if(b.round===1) {
    b.r2[0]={h:b.r1[0].result.winner,a:b.r1[1].result.winner,result:null};
    b.r2[1]={h:b.r1[2].result.winner,a:b.r1[3].result.winner,result:null};
    b.round=2;
  } else if(b.round===2) {
    b.finals[0]={h:b.r2[0].result.winner,a:b.r2[1].result.winner,result:null};
    b.round=3;
  } else if(b.round===3) {
    const f=b.finals[0];
    if(f.result) {
      b.champ=f.result.winner;
      if(b.champ===G.myTeamId){G.rings++;toast('🏆 CHAMPIONS! You won the ring!');}
      else{const ct=G.teams.find(t=>t.id===b.champ);toast(ct.name+' wins the Championship.');}
    }
  }
  switchMoreTab('playoffs');
}

function doNextSeason() {
  if(G.season>=5) {
    toast('Dynasty complete! Restarting...');
    setTimeout(()=>{ newGame(); renderTeamSelect(); show('s-teams'); },1000);
    return;
  }
  G.season++;
  G.players.forEach(p=>{
    p.age++;
    const g = p.age<25?1+Math.random()*3:p.age<28?Math.random()*1.5-0.5:p.age<32?-1-Math.random()*2:-2-Math.random()*3;
    Object.keys(p.stats).forEach(k=>p.stats[k]=Math.max(30,Math.min(99,p.stats[k]+Math.round(g*(Math.random()*0.7+0.65)))));
    p.seasonStats=freshStats();
  });
  // Reset rosters for re-draft
  G.teams.forEach(t=>t.roster=[]);
  G.players.forEach(p=>p.teamId=null);
  initDraft();
  show('s-draft');
  toast('Season '+G.season+' — Re-draft your squad!');
}

// ═══════════════════════════════════
//  GAME SIMULATION
// ═══════════════════════════════════
function calcGame(homeId, awayId) {
  const hp=teamPower(homeId)+2.5;
  const ap=teamPower(awayId);
  let hs=Math.round(85+(hp/100)*28+Math.random()*18-9);
  let as=Math.round(85+(ap/100)*28+Math.random()*18-9);
  if(hs===as)hs++;
  updatePlayerStats(homeId,hs);
  updatePlayerStats(awayId,as);
  return {hs,as};
}

function simFast(g) {
  const r=calcGame(g.home,g.away);
  g.result={hs:r.hs,as:r.as};
  applyResult(g);
}

function applyResult(g) {
  const ht=G.teams.find(t=>t.id===g.home);
  const at=G.teams.find(t=>t.id===g.away);
  if(g.result.hs>g.result.as){ht.wins++;at.losses++;}
  else{at.wins++;ht.losses++;}
  ht.pf+=g.result.hs;ht.pa+=g.result.as;
  at.pf+=g.result.as;at.pa+=g.result.hs;
  G.results.push({...g});
}

function updatePlayerStats(tid, teamScore) {
  const team=G.teams.find(t=>t.id===tid);
  if(!team) return;
  team.roster.forEach(pid=>{
    const p=G.players.find(x=>x.id===pid);
    if(!p) return;
    const isS=Object.values(G.lineupSlots).includes(pid)&&tid===G.myTeamId;
    const mins=isS?30+Math.random()*8:16+Math.random()*10;
    const pts=Math.round((mins/220)*teamScore*(1+(calcOvr(p)-75)/200)*(0.75+Math.random()*0.5));
    const reb=Math.round(mins/220*50*(p.stats.reb/99)*(0.5+Math.random()));
    const ast=Math.round(mins/220*30*(p.stats.pas/99)*(0.5+Math.random()));
    const stl=Math.floor(Math.random()*3*(p.stats.def/99));
    const blk=Math.floor(Math.random()*3*(p.stats.phy/99));
    const fga=Math.round(pts/2+1+Math.random()*3);
    const fg=Math.round(fga*(0.4+p.stats.sht/400));
    const tpa=Math.round(fga*0.35);
    const tp=Math.round(tpa*(0.3+p.stats.tp3/450));
    const ss=p.seasonStats;
    ss.gp++;ss.pts+=pts;ss.reb+=reb;ss.ast+=ast;ss.stl+=stl;ss.blk+=blk;ss.fga+=fga;ss.fg+=fg;ss.tpa+=tpa;ss.tp+=tp;
  });
}

// ── VISUAL SIM ──
function runSimVisual(game, cb) {
  const homeId=game.home;const awayId=game.away;
  const ht=G.teams.find(t=>t.id===homeId);
  const at=G.teams.find(t=>t.id===awayId);
  const r=calcGame(homeId,awayId);

  document.getElementById('sim-away-name').textContent=at.emoji+' '+at.name;
  document.getElementById('sim-home-name').textContent=ht.emoji+' '+ht.name;
  document.getElementById('sim-away-score').textContent='0';
  document.getElementById('sim-home-score').textContent='0';
  document.getElementById('sim-qtr').textContent='Q1';
  document.getElementById('sim-log').innerHTML='';

  const modal=document.getElementById('sim-modal');
  modal.classList.add('open');

  // Generate events
  const events=buildSimEvents(ht,at,r.hs,r.as);
  let ei=0;
  let hs=0,as=0;

  function tick() {
    if(ei>=events.length){
      document.getElementById('sim-away-score').textContent=r.as;
      document.getElementById('sim-home-score').textContent=r.hs;
      document.getElementById('sim-qtr').textContent='FINAL';
      game.result={hs:r.hs,as:r.as};
      applyResult(game);
      G.simCb=cb;
      return;
    }
    const ev=events[ei++];
    if(ev.home)hs+=ev.pts;else as+=ev.pts;
    document.getElementById('sim-home-score').textContent=hs;
    document.getElementById('sim-away-score').textContent=as;
    document.getElementById('sim-qtr').textContent=ev.qtr;
    const logEl=document.getElementById('sim-log');
    const line=document.createElement('div');
    line.className='sim-log-line'+(ev.big?' highlight':'');
    line.textContent=ev.text;
    logEl.prepend(line);
    setTimeout(tick,70);
  }
  tick();
}

function buildSimEvents(ht,at,hs,as) {
  const events=[];
  const hPlayers=ht.roster.map(id=>G.players.find(p=>p.id===id)).filter(Boolean);
  const aPlayers=at.roster.map(id=>G.players.find(p=>p.id===id)).filter(Boolean);
  for(let q=1;q<=4;q++) {
    const qHs=Math.round(hs/4+(Math.random()-0.5)*6);
    const qAs=Math.round(as/4+(Math.random()-0.5)*6);
    let qh=0,qa=0;
    const plays=['2:30','5:00','7:30','10:00'];
    plays.forEach(t=>{
      const isHome=Math.random()<0.5;
      const players=isHome?hPlayers:aPlayers;
      const team=isHome?ht:at;
      if(!players.length)return;
      const p=players[Math.floor(Math.random()*players.length)];
      const nick=p.name.split("'")[1]||p.name.split(' ')[0];
      const r=Math.random();
      let txt,pts=0,big=false;
      if(r<0.12){txt=`${nick} SLAMS IT HOME for ${team.name}!`;pts=2;big=true;}
      else if(r<0.30){txt=`${nick} buries the three — ${team.name}`;pts=3;big=Math.random()<0.35;}
      else if(r<0.55){txt=`${nick} drives and scores for ${team.name}`;pts=2;}
      else if(r<0.70){txt=`${nick} hits the mid-range — ${team.name}`;pts=2;}
      else if(r<0.82){txt=`${nick} grabs the board for ${team.name}`;pts=0;}
      else{txt=`${nick} threads the needle — ${team.name} assist`;pts=0;}
      if(isHome)qh+=pts;else qa+=pts;
      events.push({qtr:`Q${q} ${t}`,text:txt,home:isHome,pts,big});
    });
    events.push({qtr:`Q${q} END`,text:`End Q${q}: ${at.name} ${qa>qAs?qa:qAs} — ${ht.name} ${qh>qHs?qh:qHs}`,home:true,pts:0,big:true});
  }
  return events;
}

document.getElementById('sim-continue-btn').addEventListener('click',()=>{
  document.getElementById('sim-modal').classList.remove('open');
  if(G.simCb){G.simCb();G.simCb=null;}
});

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let toastTimer;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}
